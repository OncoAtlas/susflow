name: CI — linters, tests and coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (contact FTP)'
        required: false
        default: 'false'
      base:
        description: 'Base branch'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,parquet]"

      - name: Run ruff
        run: |
          ruff --version
          ruff check .

      - name: Check import sorting
        run: isort --check-only .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests with coverage
        run: |
          if [ "${{ github.event.inputs.run_integration || 'false' }}" = "true" ]; then
            echo "Running with integration tests enabled (live FTP)"
            RUN_INTEGRATION=true coverage run -m pytest -q
          else
            coverage run -m pytest -q
          fi
          coverage xml -o coverage.xml
          coverage report -m --fail-under=55

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  autofix:
    needs: checks
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install formatters and linters
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade ruff black isort

      - name: Run formatting and linting fixes
        run: |
          ruff check . --fix || true
          isort .
          black .

      - name: Commit changes directly to PR branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint, isort, and formatting issues"
          file_pattern: "*.py"