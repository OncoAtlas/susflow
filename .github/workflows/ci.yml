name: CI — linters, tests and coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (contact FTP)'
        required: false
        default: 'false'
      base:
        description: 'Base branch'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install .
          pip install --upgrade ruff black isort pytest pytest-mock coverage

      - name: Run ruff
        run: |
          ruff --version
          ruff check .

      - name: Check import sorting
        run: isort --check-only .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests with coverage
        run: |
          coverage run -m pytest -q
          coverage xml -o coverage.xml
          coverage report -m --fail-under=75

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  autofix:
    needs: checks
    # Só executa se o checks falhar devido a erro de formatação no pull request
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install formatters
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade black isort

      - name: Run formatting fixes
        run: |
          isort .
          black .

      - name: Commit changes directly to PR branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format python code (isort + black)"
          file_pattern: "*.py"

  integration:
    needs: checks
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install .
          pip install pytest pytest-mock

      - name: Run integration tests
        env:
          RUN_INTEGRATION: 'true'
        run: pytest tests/integration -q